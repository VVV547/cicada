<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ENIGMA_WALL | BASTION v23.5 ULTRA-STABLE</title>
<style>
:root { 
    --bg: #020202; --s: #0a0a0a; --b: #1a1a1a; --t: #e0e0e0; 
    --a: #ff9d00; --d: #ff3333; --g: #00ff66; --bl: #0088ff;
    --f: 'JetBrains Mono', 'Consolas', monospace; 
}
* { box-sizing: border-box; transition: 0.1s; border-radius: 0 !important; outline: none; }
body, html { margin: 0; padding: 0; background: var(--bg); color: var(--t); font-family: var(--f); height: 100vh; overflow: hidden; }

/* Grid Setup */
.m-grid { display: grid; grid-template-columns: 400px 1fr 400px; grid-template-rows: 65px 1fr 220px; height: 100vh; gap: 1px; background: var(--b); }

/* UI Modules */
.nav { grid-column: 1 / 4; background: var(--s); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 2px solid var(--a); z-index: 10; }
.logo { font-weight: 900; font-size: 22px; letter-spacing: 8px; color: var(--a); text-shadow: 0 0 10px rgba(255,157,0,0.3); }
.l-btn { background: transparent; border: 1px solid var(--a); color: var(--a); padding: 8px 18px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 2px; }
.l-btn:hover { background: var(--a); color: #000; box-shadow: 0 0 15px var(--a); }

.w { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; position: relative; }
.w-h { padding: 15px 25px; background: var(--s); font-size: 11px; font-weight: 900; letter-spacing: 3px; color: var(--a); border-bottom: 1px solid var(--b); display: flex; justify-content: space-between; align-items: center; }
.v-v { flex: 1; background: #000; position: relative; overflow: hidden; border-bottom: 1px solid var(--b); }
#sC { width: 100%; height: 100%; }

.u-p { padding: 20px; flex: 1; overflow-y: auto; scrollbar-width: thin; }
label { display: block; font-size: 9px; color: #666; margin-bottom: 10px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
input, textarea, select { width: 100%; background: #050505; border: 1px solid var(--b); color: var(--a); padding: 14px; font-family: inherit; font-size: 13px; margin-bottom: 18px; resize: none; border-left: 2px solid var(--b); }
input:focus, textarea:focus { border-left-color: var(--a); background: #080808; }
.k-f { text-align: center; font-weight: bold; letter-spacing: 4px; border: 1px double var(--a); font-size: 18px; color: #fff; background: #000; }

.b-s { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
button:not(.l-btn) { background: #0d0d0d; border: 1px solid var(--b); color: var(--t); padding: 16px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
button:not(.l-btn):hover { background: #1a1a1a; border-color: var(--a); color: var(--a); }
.b-a { border-color: var(--a) !important; color: var(--a) !important; box-shadow: inset 0 0 10px rgba(255,157,0,0.1); }
.b-e { border-color: var(--d) !important; color: var(--d) !important; }

.sc-b { height: 150px; background: #000; border-top: 1px solid var(--b); position: relative; }
#sc { width: 100%; height: 100%; }
.ind { position: absolute; bottom: 10px; left: 20px; font-size: 9px; color: var(--a); display: flex; gap: 15px; background: rgba(0,0,0,0.7); padding: 5px; }

/* Console & Logs */
.c-l { grid-column: 1 / 4; padding: 15px 30px; font-size: 11px; color: #444; overflow-y: scroll; border-top: 2px solid var(--b); background: #010101; }
.l-r { margin-bottom: 6px; border-left: 2px solid #222; padding-left: 15px; display: flex; align-items: baseline; }
.l-t { color: #666; font-size: 9px; min-width: 80px; font-weight: bold; }
.l-m { color: var(--t); }
.sys { color: var(--a); font-weight: 900; }

/* Animations */
@keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
.rec-active { color: var(--d); animation: pulse 1s infinite; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--a); }
</style>
</head>
<body>

<div class="m-grid">
    <header class="nav">
        <div class="logo">ENIGMA_WALL | BASTION v23.5</div>
        <div style="display:flex; align-items:center; gap:40px;">
            <button class="l-btn" onclick="sys.toggleLang()">LANG_SWITCH</button>
            <div id="clk" style="font-size: 14px; color: #333; font-weight: 900;">00:00:00</div>
        </div>
    </header>

    <!-- LEFT: SECURITY SEED -->
    <section class="w">
        <div class="w-h"><span data-l="m1">ГЕОМЕТРИЯ_КЛЮЧА</span> <span id="v-stat" style="color:var(--g)">[STABLE]</span></div>
        <div class="v-v"><canvas id="sC"></canvas></div>
        <div class="u-p">
            <label data-l="lk">КЛЮЧ (SEED):</label>
            <input type="text" id="k" class="k-f" value="B-99-ULTRA-CORE" oninput="crypto.reinit()">
            <div class="b-s">
                <button onclick="sys.newKey()" data-l="bg">ГЕНЕРАЦИЯ</button>
                <button onclick="sys.saveImg()" data-l="be">ЭКСПОРТ</button>
            </div>
            <label style="margin-top:20px;" data-l="lr">ИНТЕНСИВНОСТЬ:</label>
            <select id="diff" onchange="crypto.reinit()">
                <option value="1">1:1 LIGHT (Fast)</option>
                <option value="2" selected>1:2 MEDIUM (Balanced)</option>
                <option value="3">1:3 HARD (Secure)</option>
                <option value="4">1:4 OVERKILL</option>
            </select>
        </div>
    </section>

    <!-- CENTER: TRANSMISSION -->
    <section class="w" style="border-left: 1px solid var(--b); border-right: 1px solid var(--b);">
        <div class="w-h"><span data-l="m2">ТРАНСЛЯЦИЯ</span> <span id="tx-stat">IDLE</span></div>
        <div class="u-p">
            <label data-l="li">ВВОД (RAW_DATA):</label>
            <textarea id="rawIn" rows="11" placeholder="..." oninput="crypto.sync()"></textarea>
            <label data-l="lo">ШИФР (CIPHERTEXT):</label>
            <textarea id="cipOut" rows="11" readonly></textarea>
            <div class="b-s">
                <button class="b-a" onclick="modem.tx(false)" data-l="bt">В ЭФИР</button>
                <button onclick="modem.tx(true)" data-l="bs">В ФАЙЛ</button>
            </div>
            <div id="dl" style="display:none; margin-top:15px; text-align:center;">
                <a id="dlL" style="color:var(--bl); font-size:10px; text-decoration:none; border:1px solid; padding:5px;" download="pkt_bastion.webm">>> ПОЛУЧИТЬ ПАКЕТ (WEBM)</a>
            </div>
        </div>
        <div class="sc-b">
            <canvas id="sc"></canvas>
            <div class="ind">
                <span>VOL: <b id="i-v">-∞</b></span>
                <span>FREQ: <b id="i-f">0</b></span>
                <span>THR: <b id="i-t">-50dB</b></span>
            </div>
        </div>
    </section>

    <!-- RIGHT: ANALYSIS -->
    <section class="w">
        <div class="w-h"><span data-l="m3">АНАЛИЗ_ЭФИРА</span> <span id="rx-stat">OFFLINE</span></div>
        <div class="u-p">
            <label data-l="lc">ПРИЕМ (RAW_RX):</label>
            <textarea id="cipIn" rows="13" placeholder="..." oninput="crypto.sync()"></textarea>
            <div class="b-s">
                <button id="listenBtn" class="b-e" onclick="modem.toggleRx()" data-l="bm">СЛУШАТЬ</button>
                <button onclick="document.getElementById('f').click()" data-l="bf">ОТКРЫТЬ</button>
            </div>
            <input type="file" id="f" hidden onchange="modem.decodeFile(this)">
            
            <label style="margin-top:30px;" data-l="ls">РЕЗУЛЬТАТ (DECODED):</label>
            <textarea id="rawOut" rows="13" readonly style="border-color:var(--g); color:#00ff00; background:#020502;"></textarea>
            <button onclick="sys.copy()" style="width:100%; margin-top:10px; border-color:var(--g); color:var(--g);" data-l="bc">COPY_TO_CLIPBOARD</button>
        </div>
    </section>

    <!-- FOOTER: SYSTEM LOGS -->
    <footer class="c-l" id="con"></footer>
</div>

<script>
/**
 * BASTION CORE v23.5 - THE MONOLITH
 * Full Signal Processing & Cryptography Logic
 * Lines: 500+
 */

const ABC = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzАБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдеёжзийклмнопрстуфхцчшщъыьэюя .,!?-/+=:@#$%^&*()_[]{}<>";
const ac = new (window.AudioContext || window.webkitAudioContext)();
let ana, isL = false, lang = 'ru', rxSource = null;

const dict = {
    ru: {
        m1: "ГЕОМЕТРИЯ_КЛЮЧА", m2: "ТРАНСЛЯЦИЯ", m3: "АНАЛИЗ_ЭФИРА",
        lk: "КЛЮЧ (SEED):", lr: "СЛОЖНОСТЬ:", li: "ВВОД (RAW):", lo: "ШИФР (CIPHER):",
        lc: "ПРИЕМ:", ls: "РЕЗУЛЬТАТ:", bg: "ГЕНЕРАЦИЯ", be: "ЭКСПОРТ",
        bt: "В ЭФИР", bs: "В ФАЙЛ", bm: "СЛУШАТЬ", bf: "ОТКРЫТЬ", bc: "КОПИРОВАТЬ",
        i: "СИСТЕМА BASTION v23.5 АКТИВИРОВАНА.", u: "ЯДРО: КЛЮЧИ ОБНОВЛЕНЫ.",
        t: "TX: ГЕНЕРАЦИЯ СИГНАЛА...", r: "RX: ДЕКОДИРОВАНИЕ ЗАВЕРШЕНО."
    },
    en: {
        m1: "KEY_GEOMETRY", m2: "TRANSMISSION", m3: "ETHER_ANALYSIS",
        lk: "SEED_KEY:", lr: "DENSITY:", li: "DATA_IN:", lo: "CIPHER_OUT:",
        lc: "RECEPTION:", ls: "RESULT:", bg: "GENERATE", be: "EXPORT",
        bt: "BROADCAST", bs: "TO FILE", bm: "LISTEN", bf: "OPEN", bc: "COPY",
        i: "BASTION v23.5 SYSTEM ARMED.", u: "CORE: SEED ROTATED.",
        t: "TX: EMITTING PULSE...", r: "RX: DECODING FINISHED."
    }
};

// --- SYSTEM UTILS ---
const sys = {
    log(m, s = false) {
        const c = document.getElementById('con');
        const t = new Date().toLocaleTimeString();
        const tag = s ? `<span class="sys">[CORE]</span>` : `<span>[LOG]</span>`;
        c.innerHTML += `<div class="l-r"><span class="l-t">${t}</span> <span class="l-m">${tag} ${m}</span></div>`;
        c.scrollTop = c.scrollHeight;
        if(c.childElementCount > 100) c.removeChild(c.firstChild);
    },
    toggleLang() {
        lang = lang === 'ru' ? 'en' : 'ru';
        document.querySelectorAll('[data-l]').forEach(e => { e.innerText = dict[lang][e.getAttribute('data-l')]; });
        this.log("LANGUAGE_CHANGED", true);
    },
    newKey() {
        const s = "0123456789ABCDEF-XYZ";
        let k = "B-";
        for(let i=0; i<12; i++) k += s[Math.floor(Math.random()*s.length)];
        document.getElementById('k').value = k;
        crypto.reinit();
    },
    saveImg() {
        const l = document.createElement('a');
        l.download = 'bastion_key.png';
        l.href = document.getElementById('sC').toDataURL();
        l.click();
    },
    copy() {
        const el = document.getElementById('rawOut');
        el.select();
        document.execCommand('copy');
        this.log("COPIED_TO_CLIPBOARD");
    }
};

// --- VISUAL DSP ---
const visual = {
    nodes: [],
    init(seed) {
        const cv = document.getElementById('sC'), ctx = cv.getContext('2d');
        const b = cv.parentElement;
        cv.width = b.clientWidth; cv.height = b.clientHeight;
        let s = [...seed].reduce((a,b)=>a+b.charCodeAt(0)*33, 0);
        const r = () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
        this.nodes = [];
        for(let i=0; i<60; i++) this.nodes.push({x: r()*cv.width, y: r()*cv.height, vx: (r()-0.5), vy: (r()-0.5)});
        this.loop(cv, ctx, seed);
    },
    loop(cv, ctx, seed) {
        const draw = () => {
            if(document.getElementById('k').value !== seed) return;
            ctx.fillStyle = 'rgba(2,2,2,0.15)'; ctx.fillRect(0,0,cv.width,cv.height);
            this.nodes.forEach(n => {
                n.x += n.vx; n.y += n.vy;
                if(n.x<0||n.x>cv.width) n.vx*=-1;
                if(n.y<0||n.y>cv.height) n.vy*=-1;
                this.nodes.forEach(n2 => {
                    let d = Math.hypot(n.x-n2.x, n.y-n2.y);
                    if(d<120) {
                        ctx.beginPath(); ctx.strokeStyle = `rgba(255,157,0,${(1-d/120)*0.4})`;
                        ctx.lineWidth = 0.5; ctx.moveTo(n.x,n.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();
                    }
                });
                ctx.fillStyle = '#ff9d00'; ctx.fillRect(n.x-1,n.y-1,2,2);
            });
            requestAnimationFrame(draw);
        };
        draw();
    }
};

// --- CRYPTO MODULE ---
const crypto = {
    eMap: {}, dMap: {}, r: 2,
    reinit() {
        const k = document.getElementById('k').value;
        this.r = parseInt(document.getElementById('diff').value);
        visual.init(k);
        let s = [...k].reduce((a,b)=>a+b.charCodeAt(0)*13, 0);
        const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
        let p = ABC.split('');
        for(let i=p.length-1; i>0; i--) { const j = Math.floor(rnd() * (i+1)); [p[i], p[j]] = [p[j], p[i]]; }
        this.eMap = {}; this.dMap = {};
        ABC.split('').forEach((c, i) => {
            let ch = ""; for(let j=0; j<this.r; j++) ch += p[(i + j * 17) % p.length];
            this.eMap[c] = ch; this.dMap[ch] = c;
        });
        this.sync();
        sys.log(dict[lang].u, true);
    },
    sync() {
        const ri = document.getElementById('rawIn').value;
        document.getElementById('cipOut').value = ri.split('').map(c => this.eMap[c] || c).join('');
        const ci = document.getElementById('cipIn').value;
        let res = "";
        for(let i=0; i<ci.length; i+=this.r) {
            let seg = ci.substr(i, this.r);
            res += this.dMap[seg] || (seg.length === this.r ? "" : seg);
        }
        document.getElementById('rawOut').value = res;
    }
};

// --- MODEM (DSP) ---
const modem = {
    tx(save) {
        const d = document.getElementById('cipOut').value;
        if(!d) return;
        if(ac.state === 'suspended') ac.resume();
        const dest = ac.createMediaStreamDestination();
        let rec, chunks = [];
        if(save) {
            rec = new MediaRecorder(dest.stream);
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const u = URL.createObjectURL(new Blob(chunks, {type:'audio/webm'}));
                const a = document.getElementById('dlL'); a.href = u;
                document.getElementById('dl').style.display = 'block'; a.click();
            };
            rec.start();
        }
        ana = ac.createAnalyser();
        let t = ac.currentTime + 0.5;
        this.pulse(2500, t, 0.4, dest, save); t += 0.5; // Sync bit
        d.split('').forEach(c => {
            const f = 1100 + (ABC.indexOf(c) * 18);
            this.pulse(f, t, 0.2, dest, save); t += 0.25;
        });
        if(save) setTimeout(() => rec.stop(), (t - ac.currentTime + 0.5)*1000);
        this.scope();
        sys.log(dict[lang].t);
        document.getElementById('tx-stat').innerText = "TRANSMITTING...";
        setTimeout(() => document.getElementById('tx-stat').innerText = "IDLE", (t - ac.currentTime)*1000);
    },
    pulse(f, t, d, dest, s) {
        const o = ac.createOscillator(), g = ac.createGain();
        o.frequency.setValueAtTime(f, t);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.4, t+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t+d);
        o.connect(g); g.connect(ana); g.connect(dest);
        if(!s) g.connect(ac.destination);
        o.start(t); o.stop(t+d);
    },
    toggleRx() {
        const b = document.getElementById('listenBtn');
        if(isL) { location.reload(); return; }
        isL = true; b.innerText = "HALT_RX"; b.classList.add('b-a');
        document.getElementById('rx-stat').innerText = "LISTENING";
        sys.log("DSP_INIT: BANDPASS_FILTER_ON", true);

        navigator.mediaDevices.getUserMedia({audio: {echoCancellation: false, noiseSuppression: false}})
        .then(st => {
            rxSource = ac.createMediaStreamSource(st);
            // Bandpass filter to clear noise
            const filter = ac.createBiquadFilter();
            filter.type = "bandpass"; filter.frequency.value = 2500; filter.Q.value = 1.0;
            
            ana = ac.createAnalyser(); ana.fftSize = 4096;
            rxSource.connect(filter); filter.connect(ana);
            this.scope();
            
            const buf = new Float32Array(ana.frequencyBinCount);
            let lastC = "", lastT = 0;
            const rxLoop = () => {
                if(!isL) return;
                ana.getFloatFrequencyData(buf);
                let mv = -Infinity, mi = -1;
                for(let i=100; i<800; i++) { if(buf[i]>mv) { mv=buf[i]; mi=i; } }
                const f = mi * ac.sampleRate / ana.fftSize;
                document.getElementById('i-v').innerText = Math.round(mv) + "dB";
                document.getElementById('i-f').innerText = Math.round(f) + "Hz";

                if(mv > -50 && f > 1090) {
                    const c = ABC[Math.round((f-1100)/18)];
                    const now = Date.now();
                    if(c && c !== lastC && (now - lastT > 180)) {
                        document.getElementById('cipIn').value += c;
                        lastC = c; lastT = now; crypto.sync();
                    }
                }
                requestAnimationFrame(rxLoop);
            };
            rxLoop();
        });
    },
    scope() {
        const cv = document.getElementById('sc'), ctx = cv.getContext('2d');
        const buf = new Uint8Array(ana.frequencyBinCount);
        const draw = () => {
            if(!ana) return;
            ana.getByteTimeDomainData(buf);
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,cv.width,cv.height);
            ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
            for(let i=0; i<cv.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,cv.height); ctx.stroke(); }
            ctx.strokeStyle = '#ff9d00'; ctx.lineWidth = 2; ctx.beginPath();
            let sw = cv.width / buf.length, x = 0;
            for(let i=0; i<buf.length; i++) {
                let v = buf[i]/128.0, y = v * (cv.height/2);
                i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); x += sw;
            }
            ctx.stroke();
            if(isL || ac.state === 'running') requestAnimationFrame(draw);
        };
        draw();
    },
    async decodeFile(input) {
        if(!input.files.length) return;
        sys.log("DSP_SCAN: ANALYZING_BUFFER...");
        const ab = await input.files[0].arrayBuffer();
        try {
            const buffer = await ac.decodeAudioData(ab);
            const raw = buffer.getChannelData(0), sr = buffer.sampleRate;
            let res = "", step = Math.floor(0.25 * sr);
            for(let i=0; i < raw.length - 2048; i += step) {
                let bestF = 0, bestA = 0;
                for(let f = 1090; f < 4000; f += 18) {
                    let re = 0, im = 0;
                    for(let n=0; n<512; n++) {
                        let a = 2*Math.PI*f*n/sr;
                        re += raw[i+n] * Math.cos(a); im += raw[i+n] * Math.sin(a);
                    }
                    let amp = re*re + im*im;
                    if(amp > bestA) { bestA = amp; bestF = f; }
                }
                if(bestA > 0.002) res += ABC[Math.round((bestF - 1100)/18)] || "";
            }
            document.getElementById('cipIn').value = res; crypto.sync();
            sys.log(dict[lang].r, true);
        } catch(e) { sys.log("DECODE_ERROR: INVALID_PACKET", true); }
    }
};

// --- INITIALIZE ---
setInterval(() => { document.getElementById('clk').innerText = new Date().toLocaleTimeString(); }, 1000);
window.onload = () => { crypto.reinit(); sys.log(dict[lang].i, true); };
</script>
</body>
</html>
