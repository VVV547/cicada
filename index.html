<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CICADA v4.5 </title>
    <style>
        body { 
            background: #0a110a; 
            color: #4af626; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            overflow-x: hidden;
        }
        
        .terminal { 
            border: 1px solid #4af626; 
            padding: 20px; 
            width: 100%; 
            max-width: 800px; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1); 
            background: #000; 
            position: relative;
        }

        /* ЭФФЕКТ ГЛИТЧА ДЛЯ ЗАГОЛОВКА */
        h2 { 
            text-align: center; 
            border-bottom: 1px solid #4af626; 
            padding-bottom: 10px; 
            margin-top: 0; 
            position: relative;
            cursor: default;
        }

        h2:hover {
            animation: glitch-skew 1s infinite linear alternate-reverse;
        }

        h2::before, h2::after {
            content: "TERMINAL: CICADA v4.5";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: none;
        }

        h2:hover::before {
            display: block;
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        h2:hover::after {
            display: block;
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        /* ИНТЕРФЕЙС */
        input, textarea, select { 
            width: 100%; 
            background: #050505; 
            color: #4af626; 
            border: 1px solid #2d5a27; 
            padding: 12px; 
            margin: 10px 0; 
            box-sizing: border-box; 
            font-size: 1.1em; 
            outline: none;
        }

        .key-input { 
            border-color: #f6d326; 
            color: #f6d326; 
            font-weight: bold; 
            text-align: center; 
            letter-spacing: 3px; 
        }

        button { 
            background: #1a331a; 
            color: #4af626; 
            border: 1px solid #4af626; 
            padding: 10px 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-family: inherit; 
            width: 100%; 
            margin: 5px 0; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { 
            background: #4af626; 
            color: #000; 
            box-shadow: 0 0 10px #4af626;
        }

        label { 
            font-size: 0.8em; 
            text-transform: uppercase; 
            color: #888; 
            display: block; 
            margin-top: 10px; 
        }

        #timer { 
            color: #ff3e3e; 
            font-weight: bold; 
            text-align: right; 
            height: 20px; 
            font-size: 0.9em; 
        }

        .download-zone { 
            border: 1px dashed #3b82f6; 
            padding: 10px; 
            margin-top: 10px; 
            display: none; 
            text-align: center; 
            color: #3b82f6; 
        }

        .file-input-wrapper { 
            border: 1px dashed #4af626; 
            padding: 10px; 
            text-align: center; 
            margin: 10px 0; 
            cursor: pointer; 
            display: block;
        }

        /* АНИМАЦИИ ГЛИТЧА */
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); }
            20% { clip: rect(40px, 9999px, 50px, 0); }
            40% { clip: rect(70px, 9999px, 80px, 0); }
            60% { clip: rect(20px, 9999px, 30px, 0); }
            80% { clip: rect(90px, 9999px, 100px, 0); }
            100% { clip: rect(50px, 9999px, 60px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(4px, 9999px, 20px, 0); }
            40% { clip: rect(90px, 9999px, 15px, 0); }
            60% { clip: rect(30px, 9999px, 50px, 0); }
            80% { clip: rect(10px, 9999px, 80px, 0); }
            100% { clip: rect(55px, 9999px, 5px, 0); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(4deg); }
            10% { transform: skew(-2deg); }
            20% { transform: skew(5deg); }
            30% { transform: skew(0deg); }
            100% { transform: skew(0deg); }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>TERMINAL: CICADA v4.5</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>КЛЮЧ ДОСТУПА:</label>
                <input type="text" id="passkey" class="key-input" maxlength="10" value="0013001700">
            </div>
            <div>
                <label>ПЛОТНОСТЬ:</label>
                <select id="ratio" onchange="process()">
                    <option value="1">1:1</option>
                    <option value="2">1:2</option>
                    <option value="3">1:3</option>
                </select>
            </div>
        </div>

        <button onclick="genKey()">СГЕНЕРИРОВАТЬ НОВЫЙ КЛЮЧ</button>

        <label>ВАШЕ СООБЩЕНИЕ:</label>
        <textarea id="rawInput" rows="2" placeholder="Текст..."></textarea>

        <label>ВЫХОД (ШИФР / АУДИО):</label>
        <textarea id="cipherOutput" rows="2" readonly></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="transmitAudio(false)" style="border-color: #f6d326; color: #f6d326;">🔊 ТРАНСЛЯЦИЯ</button>
            <button onclick="transmitAudio(true)" style="border-color: #3b82f6; color: #3b82f6;">💾 ЗАПИСАТЬ ФАЙЛ</button>
        </div>

        <div id="downloadZone" class="download-zone">
            ФАЙЛ ГОТОВ: <a id="downloadLink" style="color: #fff; text-decoration: underline;" download="cipher.webm">СКАЧАТЬ AUDIO</a>
        </div>

        <hr style="border: 0.5px solid #2d5a27; margin: 20px 0;">

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <label>ВХОД (ШИФР / ЗАГРУЗКА):</label>
            <div id="timer"></div>
        </div>
        <textarea id="cipherInput" rows="2" placeholder="Вставьте код или загрузите файл..."></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="listenAudio()" id="listenBtn" style="border-color: #ff3e3e; color: #ff3e3e;">🎙 ЭФИР</button>
            <label class="file-input-wrapper">
                📁 ЗАГРУЗИТЬ ЗВУК
                <input type="file" id="audioUpload" accept="audio/*" style="display:none;" onchange="decodeFile(this)">
            </label>
        </div>
        
        <label>РЕЗУЛЬТАТ ДЕШИФРОВКИ:</label>
        <textarea id="rawOutput" rows="2" readonly style="color: #fff;"></textarea>
    </div>

<script>
    const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzАБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдеёжзийклмнопрстуфхцчшщъыьэюя0123456789 .,!?-";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let countdown;

    function genKey() {
        let newKey = "";
        for(let i=0; i<10; i++) newKey += Math.floor(Math.random() * 10);
        document.getElementById('passkey').value = newKey;
        process();
    }

    function generateTable(seed, ratio) {
        let chars = abc.split('');
        let s = parseInt(seed) || 0;
        const random = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
        let pool = [...chars];
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        let table = {}, revTable = {};
        chars.forEach((char, i) => {
            let replacement = "";
            for(let r=0; r<ratio; r++) {
                let idx = (i + r * 17) % pool.length; 
                replacement += pool[idx];
            }
            table[char] = replacement;
            revTable[replacement] = char;
        });
        return { table, revTable, ratio };
    }

    function process() {
        const seed = document.getElementById('passkey').value;
        const ratio = parseInt(document.getElementById('ratio').value);
        const { table, revTable } = generateTable(seed, ratio);
        const text = document.getElementById('rawInput').value;
        document.getElementById('cipherOutput').value = text.split('').map(c => table[c] || c).join('');
        const crypt = document.getElementById('cipherInput').value;
        let decoded = "";
        if (ratio === 1) { decoded = crypt.split('').map(c => revTable[c] || c).join(''); }
        else {
            for (let i = 0; i < crypt.length; i += ratio) {
                let chunk = crypt.substr(i, ratio);
                decoded += revTable[chunk] || (chunk.length === ratio ? "?" : chunk);
            }
        }
        document.getElementById('rawOutput').value = decoded;
        if (crypt.length > 0) startTimer(); else stopTimer();
    }

    function transmitAudio(isRecording) {
        const text = document.getElementById('cipherOutput').value + " "; // ДОБАВИЛИ ПРОБЕЛ В КОНЕЦ
        if (!text) return;
        const dest = audioCtx.createMediaStreamDestination();
        let recorder; let chunks = [];
        
        if (isRecording) {
            recorder = new MediaRecorder(dest.stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                document.getElementById('downloadLink').href = URL.createObjectURL(blob);
                document.getElementById('downloadZone').style.display = 'block';
            };
            recorder.start();
        }
        
        let time = audioCtx.currentTime + 0.3; 
        const duration = 0.12; 
        const step = 0.18; // УВЕЛИЧИЛИ ИНТЕРВАЛ МЕЖДУ СИМВОЛАМИ ДЛЯ НАДЕЖНОСТИ

        text.split('').forEach(char => {
            const index = abc.indexOf(char);
            if (index === -1) return;
            const freq = 600 + (index * 15);
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
            osc.connect(gain); gain.connect(audioCtx.destination); gain.connect(dest);
            osc.start(time); osc.stop(time + duration);
            time += step;
        });

        // УВЕЛИЧИЛИ ЗАПАС ЗАПИСИ ДО 1 СЕКУНДЫ
        if (isRecording) {
            setTimeout(() => recorder.stop(), (time - audioCtx.currentTime + 1.0) * 1000+1000);
        }
    }




    // ДЕКОДИРОВАНИЕ ИЗ ФАЙЛА
        // Улучшенное декодирование из файла v4.6
    async function decodeFile(input) {
        const file = input.files[0];
        if (!file) return;
        
        document.getElementById('cipherInput').value = "УСИЛЕНИЕ СИГНАЛА...";
        const arrayBuffer = await file.arrayBuffer();
        const audioCtxTemp = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffer = await audioCtxTemp.decodeAudioData(arrayBuffer);
        const data = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        
        let result = "";
        let lastFoundChar = "";
        let silentStreak = 0;

        // СКАНИРУЕМ ОЧЕНЬ ПЛОТНО (каждые 20мс)
        const scanStep = Math.floor(sampleRate * 0.02); 
        const windowSize = 2048;

        for (let i = 0; i < data.length - windowSize; i += scanStep) {
            const chunk = data.slice(i, i + windowSize);
            
            // ПРОГРАММНОЕ УСИЛЕНИЕ (Нормализация)
            let maxAmp = 0;
            for(let s=0; s<chunk.length; s++) if(Math.abs(chunk[s]) > maxAmp) maxAmp = Math.abs(chunk[s]);
            
            // Если сигнал есть, даже очень слабый (0.005)
            if (maxAmp > 0.005) { 
                const freq = getPeakFrequency(chunk, sampleRate);
                if (freq > 580) {
                    const charIdx = Math.round((freq - 600) / 15);
                    if (charIdx >= 0 && charIdx < abc.length) {
                        const char = abc[charIdx];
                        if (char !== lastFoundChar) {
                            result += char;
                            lastFoundChar = char;
                            i += Math.floor(sampleRate * 0.1); // Пропуск тела символа
                        }
                        silentStreak = 0;
                        continue;
                    }
                }
            }
            
            silentStreak++;
            if (silentStreak > 3) lastFoundChar = ""; // Сброс для повторяющихся букв
        }
        
        document.getElementById('cipherInput').value = result;
        process();
    }

    // Функция точного поиска доминирующей частоты
    function getPeakFrequency(data, sampleRate) {
        let maxAmp = 0;
        let bestFreq = 0;

        // Ищем только в нашем диапазоне частот CICADA
        for (let f = 590; f < 3000; f += 5) {
            let r = 0, q = 0;
            for (let n = 0; n < data.length; n++) {
                const angle = (2 * Math.PI * f * n) / sampleRate;
                r += data[n] * Math.cos(angle);
                q += data[n] * Math.sin(angle);
            }
            const amp = r * r + q * q;
            if (amp > maxAmp) {
                maxAmp = amp;
                bestFreq = f;
            }
        }
        return bestFreq;
    }

    function detectFreq(buffer, sampleRate) {
        let maxVal = -Infinity; let maxIdx = -1;
        const fftSize = 2048;
        // Упрощенный поиск пика для файла
        const spectrum = new Float32Array(fftSize/2);
        for(let i=0; i<fftSize; i++) spectrum[i] = buffer[i] || 0; 
        // Здесь используется упрощенная логика детекции частоты
        let bestFreq = 0; let bestAmp = 0;
        for (let f = 600; f < 3000; f += 5) {
            let amp = 0;
            for (let i = 0; i < 200; i++) amp += Math.abs(buffer[i] * Math.sin(2 * Math.PI * f * i / sampleRate));
            if (amp > bestAmp) { bestAmp = amp; bestFreq = f; }
        }
        return bestAmp > 0.5 ? bestFreq : 0;
    }

    let isListening = false;
    function listenAudio() {
        if (isListening) { location.reload(); return; }
        isListening = true;
        document.getElementById('listenBtn').innerText = "⏹ СТОП";
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; source.connect(analyser);
            const buffer = new Float32Array(analyser.frequencyBinCount);
            function detect() {
                analyser.getFloatFrequencyData(buffer);
                let maxVal = -Infinity; let maxIdx = -1;
                for (let i = 0; i < buffer.length; i++) { if (buffer[i] > maxVal) { maxVal = buffer[i]; maxIdx = i; } }
                const freq = maxIdx * audioCtx.sampleRate / analyser.fftSize;
                if (maxVal > -45 && freq > 580) {
                    const charIdx = Math.round((freq - 600) / 15);
                    if (charIdx >= 0 && charIdx < abc.length) {
                        const char = abc[charIdx];
                        const input = document.getElementById('cipherInput');
                        if (input.value.slice(-1) !== char) { input.value += char; process(); }
                    }
                }
                if (isListening) requestAnimationFrame(detect);
            }
            detect();
        });
    }

    function startTimer() {
        const timerDisplay = document.getElementById('timer');
        let timeLeft = 30; clearInterval(countdown);
        countdown = setInterval(() => {
            timeLeft--; timerDisplay.innerText = `САМОУНИЧТОЖЕНИЕ: ${timeLeft}s`;
            if (timeLeft <= 0) { clearInterval(countdown); document.getElementById('rawOutput').value = "ДАННЫЕ СТЕРТЫ"; }
        }, 1000);
    }
    function stopTimer() { clearInterval(countdown); document.getElementById('timer').innerText = ""; }

    document.getElementById('passkey').oninput = process;
    document.getElementById('rawInput').oninput = process;
    document.getElementById('cipherInput').oninput = process;
</script>
</body>
</html>
